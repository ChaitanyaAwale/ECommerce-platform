spring.application.name=E-Commerce-platform
#spring.application.name=ecommerce

# Database Configuration
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/ecommercedb
spring.datasource.username=root
spring.datasource.password=Pass@124

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080
server.servlet.context-path=/api/v1

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
# JWT Configuration
#jwt.secretKey=your-super-secret-key-at-least-32-characters-long